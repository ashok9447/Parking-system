# Render Blueprint for Parking System
# This file defines all services needed for deployment

databases:
  - name: parking-db
    databaseName: parking_db
    user: parking_user
    plan: free
    region: singapore

services:
  # Backend API Service
  - type: web
    name: parking-backend
    runtime: node
    plan: free
    region: singapore
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: parking-db
          property: connectionString
    healthCheckPath: /parking/status

  # Frontend Static Site
  - type: web
    name: parking-frontend
    runtime: static
    plan: free
    region: singapore
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: parking-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

